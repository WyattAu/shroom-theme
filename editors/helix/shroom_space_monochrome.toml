# Shroom Space (Monochrome) for Helix
# Generated from VS Code theme. Do not edit manually.
# Install: copy to ~/.config/helix/themes/shroom_space_monochrome.toml

[palette]
bg = "#1C1C1C"
fg = "#CCCCCC"
bg_dark = "#0A0A0A"
bg_light = "#2D2D2D"
bg_highlight = "#2D2D2D"
selection = "#444444"
cursor_line = "#2D2D2D"
line_number = "#88888880"
line_number_active = "#CCCCCC"
accent = "#777777"
comment = "#777777"
keyword = "#FFFFFF"
string = "#BBBBBB"
number = "#CCCCCC"
constant = "#CCCCCC"
variable = "#DDDDDD"
func = "#FFFFFF"
type = "#EEEEEE"
class = "#EEEEEE"
namespace = "#AAAAAA"
operator = "#AAAAAA"
punctuation = "#888888"
regexp = "#AAAAAA"
tag = "#AAAAAA"
attribute = "#AAAAAA"
decorator = "#EEEEEE"
purple = "#BE9AF7"
teal = "#74D7C8"
green = "#A6C18B"
amber = "#E8C990"
red = "#E68484"
blue = "#82AAFF"
muted = "#726D89"
error = "#FFFFFF"
warning = "#AAAAAA"
info = "#BBBBBB"

[ui]
background = "bg"
foreground = "fg"
cursorline = "cursor_line"
color-columns = "bg_light"

[ui.cursor]
foreground = "bg"
background = "fg"

[ui.cursor.primary]
foreground = "bg"
background = "cursor"

[ui.cursor.match]
foreground = "purple"

[ui.linenr]
foreground = "line_number"

[ui.linenr.selected]
foreground = "line_number_active"

[ui.statusline]
foreground = "fg"
background = "bg_dark"

[ui.statusline.inactive]
foreground = "muted"
background = "bg_darker"

[ui.statusline.normal]
foreground = "bg"
background = "purple"

[ui.statusline.insert]
foreground = "bg"
background = "teal"

[ui.statusline.select]
foreground = "bg"
background = "amber"

[ui.popup]
foreground = "fg"
background = "bg_light"

[ui.window]
foreground = "accent"

[ui.help]
foreground = "fg"
background = "bg_light"

[ui.text]
foreground = "fg"

[ui.text.focus]
foreground = "purple"

[ui.text.inactive]
foreground = "muted"

[ui.text.info]
foreground = "teal"

[ui.virtual]
foreground = "muted"

[ui.virtual.ruler]
foreground = "bg_highlight"

[ui.virtual.whitespace]
foreground = "muted"

[ui.virtual.indent-guide]
foreground = "muted"

[ui.virtual.inlay-hint]
foreground = "muted"
italic = true

[ui.selection]
background = "selection"

[ui.cursorline.primary]
background = "cursor_line"

[ui.bufferline]
foreground = "muted"
background = "bg_dark"

[ui.bufferline.active]
foreground = "fg"
background = "bg"

[syntax]
"type" = "type"
"type.builtin" = "amber"
"type.enum" = "type"
"type.enum.variant" = "amber"
"constructor" = "amber"
"constant" = "constant"
"constant.builtin" = "amber"
"constant.builtin.boolean" = "constant"
"constant.character" = "string"
"constant.character.escape" = "amber"
"constant.numeric" = "number"
"constant.numeric.integer" = "number"
"constant.numeric.float" = "number"
"string" = "string"
"string.regexp" = "regexp"
"string.special" = "amber"
"string.special.path" = "blue"
"string.special.url" = "blue"
"string.special.symbol" = "amber"
"comment" = "comment"
"comment.line" = "comment"
"comment.block" = "comment"
"comment.block.documentation" = "comment"
"variable" = "variable"
"variable.builtin" = "constant"
"variable.parameter" = "blue"
"variable.other" = "fg"
"variable.other.member" = "fg"
"label" = "blue"
"punctuation" = "punctuation"
"punctuation.delimiter" = "punctuation"
"punctuation.bracket" = "punctuation"
"punctuation.special" = "amber"
"keyword" = "keyword"
"keyword.control" = "keyword"
"keyword.control.conditional" = "keyword"
"keyword.control.repeat" = "keyword"
"keyword.control.import" = "keyword"
"keyword.control.return" = "keyword"
"keyword.control.exception" = "keyword"
"keyword.operator" = "operator"
"keyword.directive" = "keyword"
"keyword.storage" = "keyword"
"keyword.storage.type" = "keyword"
"keyword.storage.modifier" = "keyword"
"operator" = "operator"
"function" = "func"
"function.builtin" = "teal"
"function.method" = "func"
"function.macro" = "keyword"
"function.special" = "amber"
"tag" = "tag"
"tag.attribute" = "attribute"
"tag.delimiter" = "punctuation"
"namespace" = "namespace"
"module" = "namespace"
"special" = "amber"
"attribute" = "decorator"

[marker]
error = "error"
warning = "warning"
info = "info"
hint = "teal"

[diagnostic]
error = { fg = "error", underline-style = "curl" }
warning = { fg = "warning", underline-style = "curl" }
info = { fg = "info", underline-style = "curl" }
hint = { fg = "teal", underline-style = "curl" }
