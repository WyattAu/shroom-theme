# Shroom Space (Tritanopia) for Helix
# Generated from VS Code theme. Do not edit manually.
# Install: copy to ~/.config/helix/themes/shroom_space_tritanopia.toml

[palette]
bg = "#24212E"
fg = "#CCC8D9"
bg_dark = "#1E1C29"
bg_light = "#2A2739"
bg_highlight = "#2A2739"
selection = "#393552"
cursor_line = "#2A2739"
line_number = "#726D8980"
line_number_active = "#CCC8D9"
accent = "#726D89"
comment = "#726D89"
keyword = "#FF79C6"
string = "#C3E88D"
number = "#FF79C6"
constant = "#FF79C6"
variable = "#89DDFF"
func = "#FF79C6"
type = "#C3E88D"
class = "#C3E88D"
namespace = "#E8C990"
operator = "#FF79C6"
punctuation = "#726D89"
regexp = "#E8C990"
tag = "#FF79C6"
attribute = "#E8C990"
decorator = "#C3E88D"
purple = "#BE9AF7"
teal = "#74D7C8"
green = "#A6C18B"
amber = "#E8C990"
red = "#E68484"
blue = "#82AAFF"
muted = "#726D89"
error = "#E68484"
warning = "#89DDFF"
info = "#89DDFF"

[ui]
background = "bg"
foreground = "fg"
cursorline = "cursor_line"
color-columns = "bg_light"

[ui.cursor]
foreground = "bg"
background = "fg"

[ui.cursor.primary]
foreground = "bg"
background = "cursor"

[ui.cursor.match]
foreground = "purple"

[ui.linenr]
foreground = "line_number"

[ui.linenr.selected]
foreground = "line_number_active"

[ui.statusline]
foreground = "fg"
background = "bg_dark"

[ui.statusline.inactive]
foreground = "muted"
background = "bg_darker"

[ui.statusline.normal]
foreground = "bg"
background = "purple"

[ui.statusline.insert]
foreground = "bg"
background = "teal"

[ui.statusline.select]
foreground = "bg"
background = "amber"

[ui.popup]
foreground = "fg"
background = "bg_light"

[ui.window]
foreground = "accent"

[ui.help]
foreground = "fg"
background = "bg_light"

[ui.text]
foreground = "fg"

[ui.text.focus]
foreground = "purple"

[ui.text.inactive]
foreground = "muted"

[ui.text.info]
foreground = "teal"

[ui.virtual]
foreground = "muted"

[ui.virtual.ruler]
foreground = "bg_highlight"

[ui.virtual.whitespace]
foreground = "muted"

[ui.virtual.indent-guide]
foreground = "muted"

[ui.virtual.inlay-hint]
foreground = "muted"
italic = true

[ui.selection]
background = "selection"

[ui.cursorline.primary]
background = "cursor_line"

[ui.bufferline]
foreground = "muted"
background = "bg_dark"

[ui.bufferline.active]
foreground = "fg"
background = "bg"

[syntax]
"type" = "type"
"type.builtin" = "amber"
"type.enum" = "type"
"type.enum.variant" = "amber"
"constructor" = "amber"
"constant" = "constant"
"constant.builtin" = "amber"
"constant.builtin.boolean" = "constant"
"constant.character" = "string"
"constant.character.escape" = "amber"
"constant.numeric" = "number"
"constant.numeric.integer" = "number"
"constant.numeric.float" = "number"
"string" = "string"
"string.regexp" = "regexp"
"string.special" = "amber"
"string.special.path" = "blue"
"string.special.url" = "blue"
"string.special.symbol" = "amber"
"comment" = "comment"
"comment.line" = "comment"
"comment.block" = "comment"
"comment.block.documentation" = "comment"
"variable" = "variable"
"variable.builtin" = "constant"
"variable.parameter" = "blue"
"variable.other" = "fg"
"variable.other.member" = "fg"
"label" = "blue"
"punctuation" = "punctuation"
"punctuation.delimiter" = "punctuation"
"punctuation.bracket" = "punctuation"
"punctuation.special" = "amber"
"keyword" = "keyword"
"keyword.control" = "keyword"
"keyword.control.conditional" = "keyword"
"keyword.control.repeat" = "keyword"
"keyword.control.import" = "keyword"
"keyword.control.return" = "keyword"
"keyword.control.exception" = "keyword"
"keyword.operator" = "operator"
"keyword.directive" = "keyword"
"keyword.storage" = "keyword"
"keyword.storage.type" = "keyword"
"keyword.storage.modifier" = "keyword"
"operator" = "operator"
"function" = "func"
"function.builtin" = "teal"
"function.method" = "func"
"function.macro" = "keyword"
"function.special" = "amber"
"tag" = "tag"
"tag.attribute" = "attribute"
"tag.delimiter" = "punctuation"
"namespace" = "namespace"
"module" = "namespace"
"special" = "amber"
"attribute" = "decorator"

[marker]
error = "error"
warning = "warning"
info = "info"
hint = "teal"

[diagnostic]
error = { fg = "error", underline-style = "curl" }
warning = { fg = "warning", underline-style = "curl" }
info = { fg = "info", underline-style = "curl" }
hint = { fg = "teal", underline-style = "curl" }
