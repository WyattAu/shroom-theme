name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@900f2210b1d28bbbd0bd22d17926b9e224e8f231

      - name: Setup Node.js
        uses: actions/setup-node@670825a89dc0abd596e7a3abd0f5e3f6e5faf37c
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install system dependencies for headless testing
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2t64 libgbm1 libgtk-3-0t64 libnss3 xvfb

      - name: Lint
        run: npm run lint

      - name: Compile
        run: npm run compile

      - name: Validate themes (structure + WCAG AA)
        run: npm run validate

      - name: Test
        run: xvfb-run -a npm test

      - name: Convert themes to multi-editor formats
        run: npm run convert

      - name: Validate converted themes
        run: |
          for f in exports/tmTheme/*.tmTheme; do
            if [ ! -f "$f" ] || ! grep -q '<?xml' "$f"; then
              echo "Invalid tmTheme: $f"
              exit 1
            fi
          done
          for f in exports/jetbrains/*.icls; do
            if [ ! -f "$f" ] || ! grep -q '<scheme' "$f"; then
              echo "Invalid JetBrains scheme: $f"
              exit 1
            fi
          done
          for f in exports/vim/*.vim; do
            if [ ! -f "$f" ] || ! grep -q 'set background' "$f"; then
              echo "Invalid Vim scheme: $f"
              exit 1
            fi
          done
          for f in exports/windows-terminal/*.json; do
            if [ ! -f "$f" ] || ! python3 -c "import json; json.load(open('$f'))"; then
              echo "Invalid Windows Terminal scheme: $f"
              exit 1
            fi
          done
          echo "All converted themes validated"

      - name: Generate SBOM
        run: npm run sbom

      - name: Upload SBOM
        uses: actions/upload-artifact@484a0b528fb4d7bd804637ccb632e47a0e638317
        if: always()
        with:
          name: sbom
          path: reports/sbom.spdx.json

      # Visual regression testing
      - name: Download previous visual baseline
        uses: actions/download-artifact@45bfe0192ca1faeb007ade9deae92b16b8254a0d
        continue-on-error: true
        with:
          name: visual-references
          path: tests/visual/baseline

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Visual regression tests
        run: npm run test:visual

      - name: Upload visual references (for next run)
        uses: actions/upload-artifact@484a0b528fb4d7bd804637ccb632e47a0e638317
        if: always()
        with:
          name: visual-references
          path: tests/visual/references/

      - name: Upload WCAG reports
        uses: actions/upload-artifact@484a0b528fb4d7bd804637ccb632e47a0e638317
        if: always()
        with:
          name: wcag-reports
          path: reports/wcag-*.md

      - name: Upload converted themes
        uses: actions/upload-artifact@484a0b528fb4d7bd804637ccb632e47a0e638317
        with:
          name: converted-themes
          path: exports/

      - name: Upload visual regression diffs
        uses: actions/upload-artifact@484a0b528fb4d7bd804637ccb632e47a0e638317
        if: failure()
        with:
          name: visual-regression-diffs
          path: tests/visual/diffs/

  # Publish job - only on version tags, depends on test passing
  publish:
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@900f2210b1d28bbbd0bd22d17926b9e224e8f231

      - name: Setup Node.js
        uses: actions/setup-node@670825a89dc0abd596e7a3abd0f5e3f6e5faf37c
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Compile
        run: npm run compile

      - name: Validate themes
        run: npm run validate

      - name: Convert themes
        run: npm run convert

      - name: Package extension
        run: npx vsce package --no-dependencies

      - name: Publish to VS Code Marketplace
        run: npx vsce publish --no-dependencies || echo "Publish skipped (version may already exist)"
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65
        with:
          files: |
            *.vsix
            exports/tmTheme/*.tmTheme
            exports/jetbrains/*.icls
            exports/vim/*.vim
            exports/windows-terminal/*.json
          body_path: CHANGELOG.md
