name: Publish to VS Code Marketplace

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install system dependencies for headless testing
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2t64 libgbm1 libgtk-3-0t64 libnss3 xvfb

      - name: Lint
        run: npm run lint

      - name: Compile
        run: npm run compile

      - name: Validate themes
        run: npm run validate

      - name: Test
        run: xvfb-run -a npm test

      - name: Convert themes to multi-editor formats
        run: npm run convert

      - name: Package extension
        run: npx vsce package --no-dependencies

      - name: Publish to VS Code Marketplace
        run: npx vsce publish --no-dependencies
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            *.vsix
            exports/tmTheme/*.tmTheme
            exports/jetbrains/*.icls
            exports/vim/*.vim
            exports/windows-terminal/*.json
          body_path: CHANGELOG.md
